<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ex-Unicaja Stats</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Tabulator (midnight dark theme) -->
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>

  <style>
    :root {
      --green:      #006633;
      --green-dark: #004d26;
      --green-light:#00a651;
      --green-glow: rgba(0,102,51,.25);
      --bg:         #0f1117;
      --bg2:        #1a1d27;
      --bg3:        #222535;
      --border:     #2e3250;
      --text:       #e8eaf0;
      --text-dim:   #8b9199;
      --accent:     #00c569;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--green-dark);
      border-bottom: 3px solid var(--green-light);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .logo {
      width: 36px; height: 36px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.3px; }
    header .subtitle { font-size: .78rem; color: rgba(255,255,255,.65); margin-top: 1px; }
    header .meta { margin-left: auto; text-align: right; font-size: .75rem; color: rgba(255,255,255,.55); }
    header .meta b { color: var(--accent); }

    /* ── Nav tabs ── */
    nav.tabs {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 16px;
      gap: 4px;
    }
    nav.tabs button {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      padding: 10px 16px;
      transition: color .15s, border-color .15s;
    }
    nav.tabs button:hover { color: var(--text); }
    nav.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Tab panes ── */
    .tab-pane { display: none; padding: 16px; }
    .tab-pane.active { display: block; }

    /* ── Section label ── */
    .section-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* ── Empty state ── */
    .empty-state {
      background: var(--bg2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 28px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: .875rem;
    }

    /* ── Tabulator overrides ── */
    .tabulator {
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      overflow: hidden;
      font-size: .8rem !important;
    }
    .tabulator .tabulator-header {
      background: var(--bg3) !important;
      border-bottom: 2px solid var(--green-dark) !important;
    }
    .tabulator .tabulator-header .tabulator-col-title { font-size: .75rem !important; }
    .tabulator .tabulator-row:nth-child(even) { background: #161923 !important; }
    .tabulator .tabulator-row:hover { background: #1f2535 !important; }
    .tabulator .tabulator-cell { padding: 5px 8px !important; border-right: 1px solid #1e2235 !important; }
    .tabulator .tabulator-footer { background: var(--bg3) !important; border-top: 1px solid var(--border) !important; }

    /* avg row styling */
    #avg-row {
      margin-top: 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg3);
      display: none;
    }
    #avg-row table {
      width: 100%;
      border-collapse: collapse;
      font-size: .8rem;
    }
    #avg-row td {
      padding: 5px 8px;
      border-right: 1px solid #1e2235;
      white-space: nowrap;
      color: var(--accent);
      font-weight: 600;
    }
    #avg-row td:first-child { color: var(--text-dim); font-weight: 400; }

    /* ── History filters ── */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      align-items: center;
    }
    .filters select, .filters input[type=date] {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .82rem;
      padding: 6px 10px;
      cursor: pointer;
      min-width: 140px;
    }
    .filters select:focus, .filters input[type=date]:focus {
      outline: none;
      border-color: var(--green-light);
    }
    .filters label { font-size: .78rem; color: var(--text-dim); }

    /* ── Map ── */
    #map {
      height: calc(100vh - 130px);
      min-height: 420px;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* Leaflet popup — light/white to match Streamlit cards */
    .leaflet-popup-content-wrapper {
      background: #ffffff !important;
      color: #1a1a1a !important;
      border: 1px solid #d0d0d0 !important;
      box-shadow: 0 4px 24px rgba(0,0,0,.35) !important;
      border-radius: 10px !important;
    }
    .leaflet-popup-tip { background: #ffffff !important; }
    .leaflet-popup-content { margin: 12px 14px !important; padding: 0 !important; }
    .leaflet-popup-close-button { color: #666 !important; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 18px;
      font-size: .75rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
    footer a {
      color: var(--green-light);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* ── Spinner ── */
    #spinner {
      position: fixed; inset: 0; background: rgba(15,17,23,.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 12px;
    }
    .spin-ring {
      width: 44px; height: 44px; border-radius: 50%;
      border: 4px solid var(--bg3);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #spinner p { font-size: .85rem; color: var(--text-dim); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1rem; }
      nav.tabs button { padding: 8px 10px; font-size: .78rem; }
      .tab-pane { padding: 10px; }
    }
  </style>
</head>
<body>

<div id="spinner">
  <div class="spin-ring"></div>
  <p>Loading stats…</p>
</div>

<header>
  <div class="logo">🏀</div>
  <div>
    <h1>Ex-Unicaja Players Tracker</h1>
    <div class="subtitle">Live stats for former Unicaja Baloncesto players worldwide</div>
  </div>
  <div class="meta">
    Last updated: <b id="last-updated">—</b><br>
    <span id="record-count" style="color:var(--text-dim)"></span>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="map">Map</button>
  <button class="tab-btn" data-tab="recent">Recent Games (24 h)</button>
  <button class="tab-btn" data-tab="history">All Records</button>
</nav>

<!-- Map -->
<div id="pane-map" class="tab-pane active">
  <div id="map"></div>
</div>

<!-- Recent Games -->
<div id="pane-recent" class="tab-pane">
  <div class="section-label">Games played in the last 24 hours</div>
  <div id="table-recent"></div>
  <div id="empty-recent" class="empty-state" style="display:none">No confirmed games in the last 24 hours.</div>
</div>

<!-- All Records -->
<div id="pane-history" class="tab-pane">
  <div class="filters">
    <div>
      <label>Player</label><br>
      <select id="filter-player"><option value="">All players</option></select>
    </div>
    <div>
      <label>Competition</label><br>
      <select id="filter-comp"><option value="">All competitions</option></select>
    </div>
    <div>
      <label>From</label><br>
      <input type="date" id="filter-from">
    </div>
    <div>
      <label>To</label><br>
      <input type="date" id="filter-to">
    </div>
  </div>
  <div id="table-history"></div>
  <div id="avg-row"></div>
</div>

<footer>
  Data refreshes daily &mdash; last pipeline run: <span id="footer-date">—</span> &nbsp;|&nbsp;
  <a href="https://github.com/Eran42/unicaja-stats-hub/issues/new?title=Stats+feedback" target="_blank">Send feedback</a>
</footer>

<script>
// ─────────────────────────────────────────────
//  Config
// ─────────────────────────────────────────────
const BASE = location.href.includes('github.io') || location.protocol === 'file:'
  ? ''   // same-origin when served from GH Pages root
  : '';

const RECENT_URL  = BASE + 'data/stats/recent.json';
const INDEX_URL   = BASE + 'data/stats/index.json';
const REGISTRY_URL = BASE + 'data/players/registry.json';
const COORDS_URL  = BASE + 'data/players/team_coords.json';
const PHOTOS_URL  = BASE + 'data/players/photos.json';
const STATUS_URL  = BASE + 'data/players/status.json';

// Auto-refresh every 5 minutes
const REFRESH_MS = 5 * 60 * 1000;

// ─────────────────────────────────────────────
//  Column definitions
// ─────────────────────────────────────────────
const TEXT_COLS = [
  { title: 'Player',      field: 'player_name', width: 150, frozen: true, headerFilter: false },
  { title: 'Team',        field: 'team',         width: 130, headerFilter: false },
  { title: 'Competition', field: 'competition',  width: 110, headerFilter: false },
  { title: 'Date',        field: 'game_date',    width: 90,  sorter: 'date', headerFilter: false },
  { title: 'Opponent',    field: 'opponent',     width: 130, headerFilter: false },
  { title: 'Result',      field: 'result',       width: 100, headerFilter: false },
];

function numCol(title, field, width, decimals) {
  return {
    title, field, width: width || 52, hozAlign: 'right', headerHozAlign: 'right', headerFilter: false,
    sorter: 'number',
    formatter: (cell) => {
      const v = cell.getValue();
      if (v === null || v === undefined || v === '') return '–';
      if (decimals !== undefined) return Number(v).toFixed(decimals);
      return Number.isInteger(Number(v)) ? Math.round(v) : Number(v).toFixed(0);
    },
  };
}

const STAT_COLS = [
  numCol('MIN',  'min',         60, 0),
  numCol('PTS',  'pts',         52, 0),
  numCol('T2M',  't2m',         52, 0),
  numCol('T2A',  't2a',         52, 0),
  numCol('T2%',  't2_pct',      52, 1),
  numCol('T3M',  't3m',         52, 0),
  numCol('T3A',  't3a',         52, 0),
  numCol('T3%',  't3_pct',      52, 1),
  numCol('FTM',  'ftm',         52, 0),
  numCol('FTA',  'fta',         52, 0),
  numCol('FT%',  'ft_pct',      52, 1),
  numCol('RO',   'reb_off',     48, 0),
  numCol('RD',   'reb_def',     48, 0),
  numCol('RT',   'reb',         48, 0),
  numCol('AST',  'ast',         48, 0),
  numCol('STL',  'stl',         48, 0),
  numCol('TOV',  'tov',         48, 0),
  numCol('BLK',  'blk',         48, 0),
  numCol('F',    'fouls',       42, 0),
  numCol('+/-',  'plus_minus',  52, 0),
  numCol('VAL',  'val',         52, 0),
];

const ALL_COLS = [...TEXT_COLS, ...STAT_COLS];

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let allRecords  = [];
let registry    = [];
let teamCoords  = {};
let photos      = {};
let statusData  = {};
let mapInstance = null;
let histTable   = null;
let recentTable = null;

// ─────────────────────────────────────────────
//  Utilities
// ─────────────────────────────────────────────
function within24h(game_date) {
  if (!game_date || game_date === '—') return false;
  const gd = new Date(game_date + 'T00:00:00');
  const cutoff = new Date(Date.now() - 24 * 60 * 60 * 1000);
  // compare calendar dates only (cutoff → midnight of that day)
  const cutoffDate = new Date(cutoff.getFullYear(), cutoff.getMonth(), cutoff.getDate());
  const gdDate     = new Date(gd.getFullYear(), gd.getMonth(), gd.getDate());
  return gdDate >= cutoffDate;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

// ─────────────────────────────────────────────
//  Tab switching
// ─────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const pane = document.getElementById('pane-' + btn.dataset.tab);
    pane.classList.add('active');

    // Tabulator needs a redraw when its pane becomes visible
    if (btn.dataset.tab === 'history' && histTable)   histTable.redraw(true);
    if (btn.dataset.tab === 'recent'  && recentTable) recentTable.redraw(true);
    // Map needs invalidateSize after being hidden/shown
    if (btn.dataset.tab === 'map' && mapInstance) mapInstance.invalidateSize();
  });
});

// ─────────────────────────────────────────────
//  Recent table
// ─────────────────────────────────────────────
function buildRecentTable(records) {
  const rows = records.filter(r => r.game_date && within24h(r.game_date));

  if (rows.length === 0) {
    document.getElementById('empty-recent').style.display = '';
    return;
  }
  document.getElementById('empty-recent').style.display = 'none';

  rows.sort((a, b) => (b.game_date || '').localeCompare(a.game_date || '') ||
                       (a.player_name || '').localeCompare(b.player_name || ''));

  recentTable = new Tabulator('#table-recent', {
    data: rows,
    columns: ALL_COLS,
    layout: 'fitDataFill',
    height: Math.min(36 + rows.length * 36 + 20, 600),
    rowHeight: 36,
    movableColumns: true,
    initialSort: [{ column: 'game_date', dir: 'desc' }],
    placeholder: 'No recent games.',
  });
}

// ─────────────────────────────────────────────
//  History table + avg row
// ─────────────────────────────────────────────
const STAT_FIELDS = ['min','pts','t2m','t2a','t2_pct','t3m','t3a','t3_pct','ftm','fta','ft_pct',
  'reb_off','reb_def','reb','ast','stl','tov','blk','fouls','plus_minus','val'];
const PCT_FIELDS  = new Set(['t2_pct','t3_pct','ft_pct']);
const MADE_ATT = { t2_pct: ['t2m','t2a'], t3_pct: ['t3m','t3a'], ft_pct: ['ftm','fta'] };

function buildAvgRow(rows) {
  const el = document.getElementById('avg-row');
  if (!rows || rows.length === 0) { el.style.display = 'none'; return; }

  const n = rows.length;
  const vals = {};

  STAT_FIELDS.forEach(f => {
    if (PCT_FIELDS.has(f)) {
      const [mf, af] = MADE_ATT[f];
      const totMade = rows.reduce((s, r) => s + (Number(r[mf]) || 0), 0);
      const totAtt  = rows.reduce((s, r) => s + (Number(r[af]) || 0), 0);
      vals[f] = totAtt > 0 ? (totMade / totAtt * 100).toFixed(1) : '–';
    } else {
      const sum = rows.reduce((s, r) => s + (Number(r[f]) || 0), 0);
      vals[f] = (sum / n).toFixed(1);
    }
  });

  // Build a table row matching the column order
  const headers = [
    `Avg (${n} games)`, '', '', '', '', '',  // text cols
    vals.min, vals.pts,
    vals.t2m, vals.t2a, vals.t2_pct,
    vals.t3m, vals.t3a, vals.t3_pct,
    vals.ftm, vals.fta, vals.ft_pct,
    vals.reb_off, vals.reb_def, vals.reb,
    vals.ast, vals.stl, vals.tov, vals.blk, vals.fouls, vals.plus_minus, vals.val,
  ];

  el.innerHTML = `<table><tr>${headers.map(h => `<td>${h}</td>`).join('')}</tr></table>`;
  el.style.display = '';
}

function buildHistTable(records) {
  histTable = new Tabulator('#table-history', {
    data: records,
    columns: ALL_COLS,
    layout: 'fitDataFill',
    height: 540,
    rowHeight: 36,
    movableColumns: true,
    initialSort: [{ column: 'game_date', dir: 'desc' }],
    placeholder: 'No records match the selected filters.',
  });

  histTable.on('dataFiltered', (filters, rows) => {
    buildAvgRow(rows.map(r => r.getData()));
  });

  // Populate filter dropdowns
  const players = [...new Set(records.map(r => r.player_name).filter(Boolean))].sort();
  const comps   = [...new Set(records.map(r => r.competition).filter(Boolean))].sort();

  const pSel = document.getElementById('filter-player');
  players.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; pSel.appendChild(o); });

  const cSel = document.getElementById('filter-comp');
  comps.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o); });

  // Set default date range: today - 30 days to today
  const today = new Date().toISOString().slice(0, 10);
  const from30 = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
  document.getElementById('filter-from').value = from30;
  document.getElementById('filter-to').value   = today;

  applyHistFilters();
}

function applyHistFilters() {
  if (!histTable) return;
  const player = document.getElementById('filter-player').value;
  const comp   = document.getElementById('filter-comp').value;
  const from   = document.getElementById('filter-from').value;
  const to     = document.getElementById('filter-to').value;

  const filters = [];
  if (player) filters.push({ field: 'player_name', type: '=', value: player });
  if (comp)   filters.push({ field: 'competition',  type: '=', value: comp });
  if (from)   filters.push({ field: 'game_date', type: '>=', value: from });
  if (to)     filters.push({ field: 'game_date', type: '<=', value: to });

  histTable.setFilter(filters);
}

['filter-player','filter-comp','filter-from','filter-to'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyHistFilters);
});

// ─────────────────────────────────────────────
//  Map
// ─────────────────────────────────────────────
function buildMap() {
  mapInstance = L.map('map', { zoomControl: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(mapInstance);

  // Build team → players index
  const teamPlayers = {};
  registry.forEach(p => {
    if (!teamPlayers[p.team]) teamPlayers[p.team] = [];
    teamPlayers[p.team].push(p);
  });

  // Latest stat per player (most recent game_date)
  const latestStat = {};
  allRecords.forEach(r => {
    if (!r.player_name) return;
    const cur = latestStat[r.player_name];
    if (!cur || (r.game_date || '') > (cur.game_date || '')) latestStat[r.player_name] = r;
  });

  // Which teams had a game in the last 24h
  const teamsWithRecent = new Set(
    allRecords.filter(r => within24h(r.game_date)).map(r => r.team)
  );

  Object.entries(teamCoords).forEach(([team, coords]) => {
    if (!teamPlayers[team]) return;
    const players = teamPlayers[team];
    const teamActive = teamsWithRecent.has(team);

    const dotIcon = L.divIcon({
      className: '',
      html: `<div style="
        width:${teamActive ? 16 : 12}px;height:${teamActive ? 16 : 12}px;
        border-radius:50%;
        background:${teamActive ? '#00a651' : '#888'};
        border:2px solid white;
        box-shadow:${teamActive ? '0 0 8px rgba(0,166,81,.7)' : 'none'};
      "></div>`,
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });

    const marker = L.marker(coords, { icon: dotIcon }).addTo(mapInstance);
    const html = buildPopupHtml(team, players, latestStat, teamsWithRecent);
    marker.bindPopup(html, { maxWidth: 280, minWidth: 230 });
  });

  // Fit view to show all markers with comfortable padding
  const allCoords = Object.entries(teamCoords)
    .filter(([team]) => teamPlayers[team])
    .map(([, coords]) => coords);
  if (allCoords.length) {
    mapInstance.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });
  }
}

// ─ Player avatar HTML ─
function buildAvatar(photoUrl, hasRecent) {
  const border = hasRecent ? '#006633' : '#bbbbbb';
  const base   = `width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid ${border};flex-shrink:0;`;
  if (!photoUrl) {
    return `<div style="${base}background:#e8f0eb;display:flex;align-items:center;justify-content:center;font-size:20px;">🏀</div>`;
  }
  let imgStyle;
  if (photoUrl.includes('cortextech')) {
    imgStyle = 'width:100%;height:100%;object-fit:cover;object-position:center top;transform:scale(3.2);transform-origin:center 10%;';
  } else if (photoUrl.includes('cdn.nba.com') || photoUrl.includes('espncdn')) {
    imgStyle = 'width:100%;height:100%;object-fit:cover;object-position:center top;transform:scale(2.5);transform-origin:center 12%;';
  } else {
    imgStyle = 'width:100%;height:100%;object-fit:cover;object-position:center 10%;';
  }
  return `<div style="${base}"><img src="${photoUrl}" style="${imgStyle}" onerror="this.parentElement.innerHTML='🏀'"></div>`;
}

// ─ Stats mini-table ─
function buildStatsTable(stat) {
  const v = (f, dec) => {
    const n = stat[f];
    if (n === null || n === undefined) return '—';
    return dec !== undefined ? Number(n).toFixed(dec) : Math.round(n);
  };
  return `<table style="width:100%;border-collapse:collapse;margin-top:5px;">
    <tr style="background:#f5f5f5;text-align:center;">
      <th style="padding:3px 6px;font-size:10px;font-weight:600;color:#555;">PTS</th>
      <th style="padding:3px 6px;font-size:10px;font-weight:600;color:#555;">REB</th>
      <th style="padding:3px 6px;font-size:10px;font-weight:600;color:#555;">AST</th>
      <th style="padding:3px 6px;font-size:10px;font-weight:600;color:#555;">+/-</th>
      <th style="padding:3px 6px;font-size:10px;font-weight:600;color:#6B2FA0;">VAL</th>
    </tr>
    <tr style="text-align:center;">
      <td style="padding:4px 6px;font-size:14px;font-weight:700;">${v('pts')}</td>
      <td style="padding:4px 6px;font-size:14px;font-weight:700;">${v('reb')}</td>
      <td style="padding:4px 6px;font-size:14px;font-weight:700;">${v('ast')}</td>
      <td style="padding:4px 6px;font-size:14px;font-weight:700;">${v('plus_minus')}</td>
      <td style="padding:4px 6px;font-size:14px;font-weight:700;color:#6B2FA0;">${v('val')}</td>
    </tr>
  </table>`;
}

// ─ Single player card ─
function buildPlayerCard(player, stat, teamsWithRecent) {
  const name       = player.name;
  const team       = player.team;
  const hasRecent  = stat && within24h(stat.game_date);
  const teamPlayed = teamsWithRecent.has(team);
  const st         = statusData[name];
  const photoUrl   = photos[name] || '';

  const nameColor = hasRecent ? '#1a1a1a' : '#888888';
  const header = `<div style="display:flex;align-items:center;gap:9px;margin-bottom:5px;">
    ${buildAvatar(photoUrl, hasRecent)}
    <div>
      <div style="font-size:13px;font-weight:700;color:${nameColor};line-height:1.2;">${name}</div>
      <div style="font-size:10px;font-weight:600;color:#006633;">${team}</div>
    </div>
  </div>`;

  let body;
  if (stat && stat.game_date) {
    const gameLabel = hasRecent ? '' : 'Last game: ';
    const meta = `${gameLabel}${stat.competition} · ${stat.game_date}${stat.result ? ' · ' + stat.result : ''}`;
    body = `<div style="font-size:10px;color:#666;margin:2px 0 3px;">${meta}</div>${buildStatsTable(stat)}`;

    // Absent warning if last game was >7 days ago
    const daysSince = Math.floor((Date.now() - new Date(stat.game_date + 'T00:00:00')) / 86400000);
    if (daysSince > 7 && st && st.note) {
      body += `<div style="margin-top:5px;padding:4px 6px;background:#fff8e6;border-left:3px solid #f0a500;border-radius:3px;font-size:10px;color:#7a5500;">⚠ ${st.note}</div>`;
    }
  } else if (teamPlayed) {
    // Team played but player didn't appear
    const icon = st && st.status === 'injured' ? '🤕' : '⚠️';
    const reason = (st && st.note) ? st.note : 'Did not play';
    body = `<div style="margin-top:4px;padding:4px 7px;background:#fff8e6;border-left:3px solid #f0a500;border-radius:3px;font-size:10px;color:#7a5500;line-height:1.4;">${icon} <strong>DNP</strong> — ${reason}</div>`;
  } else {
    const reason = (st && st.note) ? st.note : 'No recent game data';
    body = `<div style="font-size:10px;color:#999;margin-top:4px;">⚠ ${reason}</div>`;
  }

  const cardStyle = [
    'font-family:sans-serif;min-width:210px;margin-bottom:7px;',
    'padding-bottom:7px;border-bottom:1px solid #e8e8e8;',
    hasRecent ? 'border-left:3px solid #006633;padding-left:8px;' : '',
  ].join('');

  // Escape name for inline onclick
  const escapedName = name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  const navLink = `<div onclick="viewHistory('${escapedName}')"
    style="margin-top:6px;padding:8px 10px;border-top:1px solid #eee;
    background:#eef7f1;border-radius:4px;color:#006633;font-size:12px;
    font-weight:700;cursor:pointer;text-align:center;user-select:none;">
    → View history
  </div>`;

  return `<div style="${cardStyle}">${header}${body}${navLink}</div>`;
}

// ─ Full popup (all players for one team) ─
function buildPopupHtml(team, players, latestStat, teamsWithRecent) {
  const cards = players.map(p => buildPlayerCard(p, latestStat[p.name], teamsWithRecent)).join('');
  return `<div style="font-family:sans-serif;">${cards}</div>`;
}

// ─ "View history" from popup ─
window.viewHistory = function(playerName) {
  if (mapInstance) mapInstance.closePopup();
  // Switch to history tab
  document.querySelector('[data-tab="history"]').click();
  // Set player filter and apply
  const sel = document.getElementById('filter-player');
  sel.value = playerName;
  applyHistFilters();
  // Scroll table into view
  setTimeout(() => document.getElementById('table-history').scrollIntoView({ behavior: 'smooth', block: 'start' }), 120);
};

// ─────────────────────────────────────────────
//  Bootstrap
// ─────────────────────────────────────────────
async function loadAll() {
  const [recent, idx, reg, coords, ph, st] = await Promise.all([
    fetch(RECENT_URL).then(r => r.json()),
    fetch(INDEX_URL).then(r => r.json()),
    fetch(REGISTRY_URL).then(r => r.json()),
    fetch(COORDS_URL).then(r => r.json()),
    fetch(PHOTOS_URL).then(r => r.json()),
    fetch(STATUS_URL).then(r => r.json()),
  ]);

  allRecords = recent.filter(r => r.game_date);  // exclude records without a known game date
  registry   = reg;
  teamCoords = coords;
  photos     = ph;
  statusData = st;

  // Update header meta
  document.getElementById('last-updated').textContent = idx.last_updated || '—';
  document.getElementById('record-count').textContent = `${allRecords.length} records · ${registry.length} players`;
  document.getElementById('footer-date').textContent = idx.last_updated || '—';

  buildMap();
  buildRecentTable(allRecords);
  buildHistTable(allRecords);

  document.getElementById('spinner').style.display = 'none';
}

loadAll().catch(err => {
  console.error('Load failed:', err);
  document.getElementById('spinner').innerHTML =
    '<p style="color:#e74c3c">Failed to load data. Check browser console.</p>';
});

// Auto-refresh
setTimeout(() => location.reload(), REFRESH_MS);
</script>
